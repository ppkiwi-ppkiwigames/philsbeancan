<!doctype html><html><head><style type="text/css">/* GOOGLE FONT */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background:
    linear-gradient(135deg, #0f172a, #111827, #1e1b4b);
  color: white;
  height: 100vh;
}

/* FALLING EMOJI BACKGROUND */

body::before {
  content:
    "💻 🌈 ⚡ 🥝 💾 🚀 👾 🖥️ 🔥 ✨ 💻 🌈 ⚡ 🥝 💾 🚀 👾 🖥️ 🔥 ✨";
  position: fixed;
  top: -100%;
  left: 0;
  width: 100%;
  height: 300%;
  font-size: 40px;
  line-height: 120px;
  opacity: 0.08;
  white-space: pre-wrap;
  pointer-events: none;
  animation: fall 25s linear infinite;
}

@keyframes fall {
  from {
    transform: translateY(-20%);
  }

  to {
    transform: translateY(20%);
  }
}

/* APP */

.app {
  position: relative;
  z-index: 2;
  padding: 18px;
  height: 100vh;
}

/* WINDOWS */

.os-window {
  background: rgba(15, 23, 42, 0.82);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 40px rgba(0,0,0,0.5),
    0 0 30px rgba(59,130,246,0.12);
  border-radius: 28px;
}

/* TITLEBAR */

.titlebar {
  padding: 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  background:
    linear-gradient(
      90deg,
      rgba(59,130,246,0.2),
      rgba(168,85,247,0.2),
      rgba(236,72,153,0.2)
    );
}

.titlebar h1 {
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(90deg, #38bdf8, #c084fc, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.titlebar p {
  color: #cbd5e1;
  margin-top: 6px;
}

.top-controls {
  display: flex;
  gap: 12px;
}

/* INPUT */

input {
  width: 320px;
  padding: 14px;
  border-radius: 18px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 15px;
  backdrop-filter: blur(12px);
}

input::placeholder {
  color: #cbd5e1;
}

/* BUTTONS */

.os-button {
  border: none;
  outline: none;
  padding: 14px 20px;
  border-radius: 18px;
  cursor: pointer;
  font-weight: 700;
  color: white;
  transition: 0.25s;
  background:
    linear-gradient(135deg, #3b82f6, #8b5cf6);
  box-shadow:
    0 0 18px rgba(99,102,241,0.4);
}

.os-button:hover {
  transform: translateY(-2px) scale(1.03);
  filter: brightness(1.15);
}

/* MAIN WINDOW */

.main-window {
  display: flex;
  height: calc(100vh - 140px);
  overflow: hidden;
}

/* PREVIEW */

.preview-side {
  width: 50%;
  border-right: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}

#previewFrame {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

/* DEVTOOLS */

.devtools-side {
  width: 50%;
  display: flex;
  flex-direction: column;
}

/* TABS */

.tabs {
  display: flex;
  gap: 8px;
  padding: 16px;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.tabs button {
  background:
    linear-gradient(135deg, #06b6d4, #8b5cf6);
  border: none;
  padding: 12px 18px;
  border-radius: 16px;
  color: white;
  cursor: pointer;
  font-weight: 700;
  transition: 0.25s;
}

.tabs button:hover {
  transform: scale(1.04);
  filter: brightness(1.15);
}

/* TOOLBAR */

.toolbar {
  padding: 14px;
  display: flex;
  gap: 12px;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* TEXTAREAS */

textarea {
  width: 100%;
  height: 100%;
  resize: none;
  border: none;
  outline: none;
  padding: 18px;
  font-family: monospace;
  font-size: 14px;
}

/* CODE VIEWER */

#codeViewer {
  background: #020617;
  color: #67e8f9;
}

/* HTML EDITOR */

#htmlEditor {
  background: #111827;
  color: #f9a8d4;
}

/* TAB CONTENT */

.tab-content {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.hidden {
  display: none;
}

/* EDITOR LAYOUT */

.editor-layout {
  display: flex;
  height: 100%;
}

.editor-panel {
  width: 50%;
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
}

.live-preview {
  width: 50%;
  display: flex;
  flex-direction: column;
}

#htmlPreview {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}</style></head><body><!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PP Kiwi Dev Tools</title>

	<link rel="stylesheet" href="styles.css" />
</head>

<body>
	<div class="app">
		<header class="titlebar os-window">
			<div>
				<h1>PP Kiwi Dev Tools</h1>
				<p>Website code viewer + HTML sandbox editor</p>
			</div>

			<div class="top-controls">
				<input
          type="text"
          id="websiteInput"
          placeholder="https://example.com"
        />

				<button id="loadBtn" class="os-button os-glow">
          Load Website
        </button>
			</div>
		</header>

		<main class="main-window os-window">
			<section class="preview-side">
				<iframe id="previewFrame"></iframe>
			</section>

			<section class="devtools-side">
				<div class="tabs">
					<button id="codeTabBtn">Code Viewer</button>
					<button id="editorTabBtn">HTML Editor</button>
				</div>

				<div id="codeTab" class="tab-content">
					<div class="toolbar">
						<button id="copyBtn" class="os-button">
              Copy Code
            </button>

						<button id="downloadBtn" class="os-button">
              Download Code
            </button>
					</div>

					<textarea id="codeViewer">
<!-- Website source code will appear here -->
          </textarea>
				</div>

				<div id="editorTab" class="tab-content hidden">
					<div class="editor-layout">
						<div class="editor-panel">
							<div class="toolbar">
								<span>HTML Input</span>

								<button id="runHtmlBtn" class="os-button">
                  Run HTML
                </button>
							</div>

							<textarea id="htmlEditor">
<html>
  <body style="background:black;color:white;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;">
    <h1>Hello From PP Kiwi Dev Tools</h1>
  </body>
</html>
              </textarea>
						</div>

						<div class="live-preview">
							<div class="toolbar">
								<span>Live Preview</span>
							</div>

							<iframe id="htmlPreview"></iframe>
						</div>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script>
		const websiteInput = document.getElementById("websiteInput");
    const previewFrame = document.getElementById("previewFrame");
    const codeViewer = document.getElementById("codeViewer");

    const loadBtn = document.getElementById("loadBtn");

    const codeTabBtn = document.getElementById("codeTabBtn");
    const editorTabBtn = document.getElementById("editorTabBtn");

    const codeTab = document.getElementById("codeTab");
    const editorTab = document.getElementById("editorTab");

    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    const htmlEditor = document.getElementById("htmlEditor");
    const htmlPreview = document.getElementById("htmlPreview");

    const runHtmlBtn = document.getElementById("runHtmlBtn");

    loadBtn.onclick = async () => {
      const url = websiteInput.value;

      if (!url) return;

      previewFrame.src = url;

      try {
        const response = await fetch(
          `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        );

        const text = await response.text();

        codeViewer.value = text;
      } catch (err) {
        codeViewer.value =
          "Unable to fetch website source code because of CORS restrictions.";
      }
    };

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(codeViewer.value);
    };

    downloadBtn.onclick = () => {
      const blob = new Blob([codeViewer.value], {
        type: "text/html",
      });

      const a = document.createElement("a");

      a.href = URL.createObjectURL(blob);

      a.download = "website-code.html";

      a.click();
    };

    codeTabBtn.onclick = () => {
      codeTab.classList.remove("hidden");
      editorTab.classList.add("hidden");
    };

    editorTabBtn.onclick = () => {
      editorTab.classList.remove("hidden");
      codeTab.classList.add("hidden");
    };

    runHtmlBtn.onclick = () => {
      htmlPreview.srcdoc = htmlEditor.value;
    };
	</script>
</body>

</html></body><html>
